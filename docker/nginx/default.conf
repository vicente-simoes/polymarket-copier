limit_req_zone $binary_remote_addr zone=copybot_per_ip_rate:10m rate=8r/s;
limit_conn_zone $binary_remote_addr zone=copybot_per_ip_conn:10m;

map $http_user_agent $copybot_blocked_ua {
  default 0;
  ~*(ahrefsbot|petalbot|claudebot|oai-searchbot|semrushbot|mj12bot) 1;
}

server {
  listen 80;
  server_name _;
  # Re-resolve Docker service names so nginx follows container IP changes.
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;
  client_max_body_size 1m;

  location = /health {
    default_type text/plain;
    return 200 "ok\n";
  }

  location = /api {
    return 404;
  }

  location = /api/route {
    return 404;
  }

  location = /_next {
    return 404;
  }

  location ^~ /_next/server {
    return 404;
  }

  location = /xmlrpc.php {
    return 404;
  }

  location = /app {
    return 404;
  }

  location ^~ /app/ {
    return 404;
  }

  location ^~ /docker-entrypoint.d/ {
    return 404;
  }

  location ~ /\.(?!well-known/) {
    return 404;
  }

  if ($copybot_blocked_ua = 1) {
    return 403;
  }

  location / {
    limit_req zone=copybot_per_ip_rate burst=20 nodelay;
    limit_conn copybot_per_ip_conn 20;

    set $web_upstream http://web:3000;
    proxy_pass $web_upstream;
    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
