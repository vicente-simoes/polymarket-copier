name: copybot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polymarket_copier}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-polymarket_copier}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - copybot_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - copybot_net

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: "no"
    command: ["pnpm", "--filter", "@copybot/db", "migrate:deploy"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-polymarket_copier}
      NODE_ENV: production
    networks:
      - copybot_net

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: ["pnpm", "--filter", "@copybot/web", "start", "--hostname", "0.0.0.0", "--port", "3000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-polymarket_copier}?connection_limit=${WEB_DB_CONNECTION_LIMIT:-10}&pool_timeout=${WEB_DB_POOL_TIMEOUT:-30}
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-long-random-secret}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-replace-me}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-replace-me}
      AUTH_GITHUB_ALLOWED_USERS: ${AUTH_GITHUB_ALLOWED_USERS:-}
      AUTH_URL: ${AUTH_URL:-}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - copybot_net

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: ["pnpm", "--filter", "@copybot/worker", "dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-polymarket_copier}?connection_limit=${WORKER_DB_CONNECTION_LIMIT:-6}&pool_timeout=${WORKER_DB_POOL_TIMEOUT:-30}
      REDIS_URL: redis://redis:6379
      POLYMARKET_API_KEY: ${POLYMARKET_API_KEY:-replace-me}
      POLYMARKET_API_SECRET: ${POLYMARKET_API_SECRET:-replace-me}
      POLYMARKET_PASSPHRASE: ${POLYMARKET_PASSPHRASE:-replace-me}
      POLYMARKET_FOLLOWER_PRIVATE_KEY: ${POLYMARKET_FOLLOWER_PRIVATE_KEY:-}
      POLYMARKET_CHAIN_ID: ${POLYMARKET_CHAIN_ID:-137}
      POLYMARKET_SIGNATURE_TYPE: ${POLYMARKET_SIGNATURE_TYPE:-EOA}
      POLYMARKET_FUNDER_ADDRESS: ${POLYMARKET_FUNDER_ADDRESS:-}
      EXECUTION_ENGINE_ENABLED: ${EXECUTION_ENGINE_ENABLED:-true}
      DRY_RUN_MODE: ${DRY_RUN_MODE:-false}
      ALCHEMY_WS_URL: ${ALCHEMY_WS_URL:-wss://polygon-mainnet.g.alchemy.com/v2/replace-me}
      COPY_SYSTEM_ENABLED: ${COPY_SYSTEM_ENABLED:-false}
      TRADE_DETECTION_ENABLED: ${TRADE_DETECTION_ENABLED:-true}
      USER_CHANNEL_WS_ENABLED: ${USER_CHANNEL_WS_ENABLED:-true}
      PANIC_MODE: ${PANIC_MODE:-false}
      RECONCILE_INTERVAL_SECONDS: ${RECONCILE_INTERVAL_SECONDS:-60}
      MIN_NOTIONAL_PER_ORDER_USD: ${MIN_NOTIONAL_PER_ORDER_USD:-1.00}
      MAX_WORSENING_BUY_USD: ${MAX_WORSENING_BUY_USD:-0.03}
      MAX_WORSENING_SELL_USD: ${MAX_WORSENING_SELL_USD:-0.06}
      MAX_SLIPPAGE_BPS: ${MAX_SLIPPAGE_BPS:-200}
      MAX_SPREAD_USD: ${MAX_SPREAD_USD:-0.03}
      ATTEMPT_EXPIRATION_SECONDS: ${ATTEMPT_EXPIRATION_SECONDS:-7200}
      COOLDOWN_PER_MARKET_SECONDS: ${COOLDOWN_PER_MARKET_SECONDS:-5}
      MAX_EXPOSURE_PER_LEADER_USD: ${MAX_EXPOSURE_PER_LEADER_USD:-100}
      MAX_EXPOSURE_PER_MARKET_OUTCOME_USD: ${MAX_EXPOSURE_PER_MARKET_OUTCOME_USD:-50}
      MAX_DAILY_NOTIONAL_TURNOVER_USD: ${MAX_DAILY_NOTIONAL_TURNOVER_USD:-100}
      MAX_RETRIES_PER_ATTEMPT: ${MAX_RETRIES_PER_ATTEMPT:-20}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-4001}
      WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-10000}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:${WORKER_HEALTH_PORT:-4001}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - copybot_net

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - ${NGINX_PORT:-8080}:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - copybot_net

networks:
  copybot_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
